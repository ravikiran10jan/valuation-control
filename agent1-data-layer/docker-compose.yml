version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_started
    environment:
      - POSTGRES_HOST=postgres
      - MONGO_URI=mongodb://mongo:27017

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: valuation_control
      POSTGRES_USER: vc_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vc_user -d valuation_control"]
      interval: 5s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  pg_data:
  mongo_data:
